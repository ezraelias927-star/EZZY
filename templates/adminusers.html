{% extends "admin1base.html" %}
{% block content %}
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col">
                <div class="table-responsive mt-5 shadow rounded">
                    <table class="table table-hover table-bordered">
                        <thead>
                            <tr>
                                <th>id</th>
                                <th>username</th>
                                <th>password</th>
                                <th>email</th>
                                <th>update</th>
                                <th>delete</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for t in matokeo %}
                            <tr>
                                <td>{{ t.id }}</td>
                                <td>{{ t.username }}</td>
                                <td>*******</td>
                                <td>{{ t.email }}</td>
                                <td>
                                    <button type="button" data-bs-toggle="modal" data-bs-target="#mimi{{ t.id}}">update</button>
                                </td>
                                <td>
                                    <button type="button" data-bs-toggle="modal" data-bs-target="#dele{{t.id}}">delete</button>
                                </td>
                            </tr>
                            <div class="modal fade "  id="mimi{{ t.id }}">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <form action="/adminupdates/{{t.id}}" method="POST">
                                         <input type="text" name="username" placeholder="andika username" class="form-control mb-5 mt-5 text-center">
                                         <input type="password" name="password" placeholder="andika password" class="form-control mb-5 text-center">
                                         <input type="email" name="email" placeholder="andika email" class="form-control mb-5 text-center">
                                         <button type="submit" class="form-control mb-5 text-warning fw-bold">UPDATE</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            <div class="modal fade" id="dele{{t.id}}">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <p class="p-3 text-center mt-5">Do you want to delete?</p>
                                        <div class=" d-flex justify-content-between">
                                            <a class="p-5 mt-2" href="/users">NO</a>
                                            <a class="p-5" href="/deleteusers/{{t.id}}">YES</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
