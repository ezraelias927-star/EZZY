{% extends "base.html" %}
{% block content %}
<body style="background-color:#F8FAFC;">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">

      <!-- Header -->
      <div class="text-center mb-4">
        <h4 class="fw-bold" style="color:#1A3A5C; letter-spacing:1px;">LOGIN HAPA</h4>
        <p class="small" style="color:#64748B;">Karibu tena!</p>
      </div>

      <!-- Card -->
      <div class="card border shadow-sm rounded-3 p-4" style="border-color:#E2E8F0;">

        <!-- Flash Messages -->
        {% with messages=get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <p class="text-danger small mb-3">⚠ {{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Form -->
        <form action="/login" method="POST">

          <div class="mb-3">
            <input type="text" name="username" placeholder="Username"
                   class="form-control" style="border-color:#E2E8F0; border-radius:8px;">
          </div>

          <div class="mb-3">
            <input type="password" name="password" placeholder="Password"
                   class="form-control" style="border-color:#E2E8F0; border-radius:8px;">
          </div>

          <div class="mb-4">
            <input type="text" name="email" placeholder="Email"
                   class="form-control" style="border-color:#E2E8F0; border-radius:8px;">
          </div>

          <button type="submit" class="btn w-100 fw-bold text-white"
                  style="background:#1A3A5C; border-radius:8px;">LOGIN</button>

        </form>

        <!-- Register Link -->
        <div class="text-center mt-3">
          <a href="/register" class="small" style="color:#1A3A5C;">
            Bado hujajisajili? <span style="color:#10B981;">Jisajili sasa!</span>
          </a>
        </div>

      </div>
    </div>
  </div>
</div>

</body>
{% endblock %}
